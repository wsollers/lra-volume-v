name: Sync volume-v to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-v/**'
      - 'bibliography/volume-v-topology-geometry.bib'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-v
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Validate volume bibliography
        run: |
          cd source
          python scripts/check_bibliography.py --bib-dir bibliography

      - name: Validate volume
        run: |
          cd source
          python scripts/build_volume.py --validate-only

      - name: Sync volume-v/ into monorepo
        run: |
          rsync -av --delete source/volume-v/ monorepo/volume-v/

      - name: Sync volume-v bibliography into monorepo
        run: |
          mkdir -p monorepo/bibliography
          cp source/bibliography/volume-v-topology-geometry.bib monorepo/bibliography/volume-v-topology-geometry.bib

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-v/ bibliography/volume-v-topology-geometry.bib
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-v from lra-volume-v"
          git push
