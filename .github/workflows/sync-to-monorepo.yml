name: Sync volume-v to monorepo

on:
  push:
    branches: [main]
    paths:
      - 'volume-v/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lra-volume-v
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: wsollers/Learning-Real-Analysis
          token: ${{ secrets.SYNC_PAT }}
          path: monorepo

      - name: Sync volume-v/ into monorepo
        run: |
          rsync -av --delete source/volume-v/ monorepo/volume-v/

      - name: Commit and push if changed
        run: |
          cd monorepo
          git config user.name  "lra-sync-bot"
          git config user.email "sync-bot@noreply.github.com"
          git add volume-v/
          git diff --cached --quiet && echo "No changes to sync" && exit 0
          git commit -m "chore: sync volume-v from lra-volume-v"
          git push
